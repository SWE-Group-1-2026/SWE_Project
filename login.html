<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SousPaw – Sign In</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">Sous<span>Paw</span></a>
    <ul class="navbar-links">
      <li><a href="index.html">Home</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="auth-card">

      <h1>Sign In</h1>
      <p class="subtitle">Welcome back! Sign in to your SousPaw account.</p>

      <button class="social-btn" onclick="continueWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input id="password" type="password" placeholder="••••••••" />
          <span id="togglePassword" class="toggle-text" onclick="togglePassword()">Show</span>
        </div>
      </div>

      <div class="forgot-link">
        <a href="#">Forgot password?</a>
      </div>

      <p id="auth-error" style="color: #d9534f; font-size: 0.85rem; margin-bottom: 15px; display: none; text-align: left;"></p>

      <button class="submit-btn" onclick="handleLogin()">Sign In</button>

      <p class="switch-link">
        Don't have an account? <a href="signup.html">Create one</a>
      </p>

    </div>
  </div>

  <script src="signupandlogin.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWMOhkUJFkzd3DG0WFN-o9fsC-L7sILcU",
      authDomain: "souspaws-9db65.firebaseapp.com",
      projectId: "souspaws-9db65",
      storageBucket: "souspaws-9db65.firebasestorage.app",
      messagingSenderId: "438669824701",
      appId: "1:438669824701:web:886f8d9f42a0caaf875dd4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.continueWithGoogle = () => {
      const errorDisplay = document.getElementById('auth-error');
    
      signInWithPopup(auth, provider).then((result) => {
          const user = result.user;
          console.log("Logged in as:", user.displayName);
        
          window.location.href = "main.html"; 
        })
        .catch((error) => {
          if (errorDisplay) {
            errorDisplay.innerText = "Google Login failed: " + error.message;
            errorDisplay.style.display = "block";
          }
          console.error("Auth Error:", error);
        });
    };
</script>
</body>
</html>
