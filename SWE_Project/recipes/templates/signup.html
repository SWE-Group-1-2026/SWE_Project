{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SousPaw - Create Account</title>
  <link rel="stylesheet" href="{% static 'recipes/signup.css' %}">
</head>
<body>
  <nav class="navbar">
  <a href="{% url 'home' %}" class="navbar-brand">Sous<span>Paw</span></a>
  <ul class="navbar-links">
    <li><a href="{% url 'search' %}" class="navbar-cta">Recipes</a></li>
    <li><a href="{% url 'home' %}" class="navbar-cta">Home</a></li>
  </ul>
</nav>

  <div class="page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join SousPaw and get started today.</p>

      <form method="post">
        {% csrf_token %}

        <div id="auth-error"{% if not error_message %} style="display: none;"{% endif %}>{{ error_message }}</div>
        <div id="auth-success"{% if not success_message %} style="display: none;"{% endif %}>{{ success_message }}</div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" value="{{ submitted_email }}">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input id="password" name="password" type="password" placeholder="••••••••">
            <span id="togglePassword" class="toggle-text" onclick="togglePassword('password', 'togglePassword')">Show</span>
          </div>
          <p class="password-hint">Minimum 8 characters</p>
        </div>

        <div class="input-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input id="confirm-password" name="confirm_password" type="password" placeholder="••••••••">
            <span id="toggleConfirm" class="toggle-text" onclick="toggleConfirmPassword()">Show</span>
          </div>
        </div>

        <button type="submit" class="submit-btn">Create Account</button>
      </form>

      <p class="switch-link">
        Already have an account? <a href="{% url 'login' %}">Sign in</a>
      </p>
    </div>
  </div>

  <script src="{% static 'recipes/auth.js' %}"></script>
</body>
</html>
