{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SousPaw - Sign In</title>
  <link rel="stylesheet" href="{% static 'recipes/login.css' %}">
</head>
<body>
  <nav class="navbar">
    <a href="{% url 'home' %}" class="navbar-brand">Sous<span>Paw</span></a>
    <ul class="navbar-links">
      <li><a href="{% url 'search' %}" class="navbar-cta">Recipes</a></li>
      <li><a href="{% url 'home' %}" class="navbar-cta">Home</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="auth-card">
      <h1>Sign In</h1>
      <p class="subtitle">Welcome back! Sign in to your SousPaw account.</p>

      <form method="post">
        {% csrf_token %}

        <div class="input-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" value="{{ submitted_email }}">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input id="password" name="password" type="password" placeholder="••••••••">
            <span id="togglePassword" class="toggle-text" onclick="togglePassword()">Show</span>
          </div>
        </div>

        <p id="auth-error" class="auth-message auth-error{% if error_message %} visible{% endif %}">{{ error_message }}</p>

        <button type="submit" class="submit-btn">Sign In</button>
      </form>

      <p class="switch-link">
        Don't have an account? <a href="{% url 'signup' %}">Create one</a>
      </p>
    </div>
  </div>

  <script src="{% static 'recipes/auth.js' %}"></script>
</body>
</html>
